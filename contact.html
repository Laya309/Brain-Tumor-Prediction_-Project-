<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us - Brain Cancer Predictor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-image: url('{{ url_for("static", filename="im2.png") }}');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
    }
  </style>
</head>
<body class="text-white">

  <!-- Navbar -->
  <nav class="flex justify-between items-center px-8 py-4 text-white">
    <h1 class="text-2xl font-bold">🧠 Brain Cancer Prediction</h1>
    <div class="space-x-6 text-lg">
      <a href="{{ url_for('home') }}" class="hover:underline">Home</a>
      <a href="{{ url_for('about') }}" class="hover:underline">About</a>
      <a href="{{ url_for('contact') }}" class="hover:underline">Contact</a>
      {% if session.get('user') %}
        <a href="{{ url_for('logout') }}" class="hover:underline">Logout</a>
      {% else %}
        <a href="{{ url_for('login') }}" class="hover:underline">Login</a>
      {% endif %}
    </div>
  </nav>

  <!-- Contact Form -->
  <div class="flex items-center justify-center h-[calc(100vh-80px)] px-4">
    <div class="bg-white bg-opacity-10 backdrop-blur-md rounded-2xl shadow-xl p-8 w-full max-w-lg">
      <h2 class="text-3xl font-bold text-center mb-6">Contact Us</h2>
      <form>
        <div class="mb-4">
          <label for="name" class="block mb-1">Name</label>
          <input type="text" id="name" name="name" required
            class="w-full px-4 py-2 rounded-xl bg-white bg-opacity-20 text-white placeholder-white focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Your name"/>
        </div>
        <div class="mb-4">
          <label for="email" class="block mb-1">Email</label>
          <input type="email" id="email" name="email" required
            class="w-full px-4 py-2 rounded-xl bg-white bg-opacity-20 text-white placeholder-white focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="you@example.com"/>
        </div>
        <div class="mb-4">
          <label for="message" class="block mb-1">Message</label>
          <textarea id="message" name="message" rows="4" required
            class="w-full px-4 py-2 rounded-xl bg-white bg-opacity-20 text-white placeholder-white focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Type your message..."></textarea>
        </div>
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-xl transition">
          Send Message
        </button>
      </form>
    </div>
  </div>

</body>
</html>
